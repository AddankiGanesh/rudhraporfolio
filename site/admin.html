<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Admin — Visitors</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin">
    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="/">
          <span class="brand-dot" aria-hidden="true"></span>
          <span>Ganesh Suraj</span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="/">Portfolio</a>
        </nav>
        <div class="nav-right">
          <button id="refresh" class="btn btn-ghost" type="button">Refresh</button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <section class="section">
        <div class="section-head">
          <h2>Visitor Log</h2>
          <p>Names captured on entry, stored in SQLite.</p>
        </div>

        <div class="admin-controls card">
          <div class="admin-row">
            <label class="admin-label">
              <span class="muted">Search</span>
              <input id="q" class="admin-input" placeholder="Type a name, IP, or UA…" />
            </label>
            <label class="admin-label">
              <span class="muted">Limit</span>
              <input id="limit" class="admin-input" type="number" min="1" max="5000" value="500" />
            </label>
            <button id="exportCsv" class="btn btn-primary" type="button">Export CSV</button>
          </div>
          <div id="securityHint" class="muted"></div>
        </div>

        <div class="card">
          <div class="table-wrap">
            <table class="table" aria-label="Visitor log">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Visited At (UTC)</th>
                  <th>IP</th>
                  <th>User Agent</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
